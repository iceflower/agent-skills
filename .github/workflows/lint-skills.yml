name: Lint Skills

on:
  push:
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "scripts/**"
      - "index/**"
  pull_request:
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "scripts/**"
      - "index/**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Lint frontmatter
        run: python scripts/lint_frontmatter.py .

      - name: Check reference links
        run: python scripts/check_references.py .

      - name: Check index completeness
        run: python scripts/check_index.py .

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/SKILL.md"
